name: Build App Desktop Release

on:
  push:
    branches:
      - main
    paths:
      - "app_desktop/**"
      - ".github/workflows/app-desktop-release.yml"
  workflow_dispatch:

concurrency:
  group: app-desktop-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app_desktop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app_desktop/package-lock.json

      - name: Install app_desktop dependencies
        run: npm ci

      - name: Build Windows desktop app
        run: npm run build:win

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-desktop-${{ github.sha }}
          name: App Desktop build #${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: |
            app_desktop/dist/*.exe
