<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

/* logo container */
.logo{
    display:flex;
    align-items:center;
    font-family:'Anton', sans-serif;
    font-size:40px;
    letter-spacing:1px;
}

/* block trắng */
.logo-moe{
    background:#fff;
    color:#000;
    padding:4px 14px;
}

/* chữ truyện */
.logo-truyen{
    color:#fff;
    margin-left:10px;
}

</style>
</head>

<body>

<div class="logo">
    <span class="logo-moe">Mòe</span>
    <span class="logo-truyen">Truyện</span>
</div>

</body>
</html>
